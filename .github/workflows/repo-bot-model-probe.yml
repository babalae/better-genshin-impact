name: Repo Bot Model Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REPO_BOT_AI_API_KEY: ${{ secrets.REPO_BOT_AI_API_KEY }}
      REPO_BOT_AI_BASE_URL: ${{ vars.REPO_BOT_AI_BASE_URL }}
    steps:
      - name: Probe models and responses
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          api_key = os.environ["REPO_BOT_AI_API_KEY"]
          base_url = os.environ["REPO_BOT_AI_BASE_URL"].rstrip("/")
          model = "gpt-5.4"

          def request(method, url, payload=None):
              headers = {
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              }
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = resp.read().decode("utf-8")
                      return resp.status, body
              except urllib.error.HTTPError as err:
                  body = err.read().decode("utf-8")
                  return err.code, body

          def probe_models(url):
              status, body = request("GET", url)
              print(f"MODELS {url} -> {status}")
              try:
                  payload = json.loads(body)
              except json.JSONDecodeError:
                  print(body[:1000])
                  return
              items = payload.get("data", [])
              ids = [item.get("id", "") for item in items if isinstance(item, dict)]
              exact = [item for item in ids if item == model]
              related = [item for item in ids if "gpt-5" in item.lower()]
              print(f"total_models={len(ids)} exact_match={bool(exact)}")
              print("matching_ids=" + json.dumps(related[:50], ensure_ascii=False))

          def probe_responses(url, payload, label):
              status, body = request("POST", url, payload)
              print(f"{label} {url} -> {status}")
              print(body[:1500])

          probe_models(f"{base_url}/models")
          probe_models(f"{base_url}/v1/models")

          probe_responses(
              f"{base_url}/v1/responses",
              {
                  "model": model,
                  "input": "Reply with pong."
              },
              "RESPONSES_MINIMAL"
          )

          probe_responses(
              f"{base_url}/v1/responses",
              {
                  "model": model,
                  "input": [
                      {
                          "role": "system",
                          "content": "Return strict JSON only."
                      },
                      {
                          "role": "user",
                          "content": "Summarize this issue in one sentence."
                      }
                  ],
                  "temperature": 0.2,
                  "text": {
                      "format": {
                          "type": "json_schema",
                          "name": "issue_help",
                          "strict": True,
                          "schema": {
                              "type": "object",
                              "additionalProperties": False,
                              "properties": {
                                  "summary": {
                                      "type": "string"
                                  }
                              },
                              "required": ["summary"]
                          }
                      }
                  }
              },
              "RESPONSES_STRUCTURED"
          )
          PY
