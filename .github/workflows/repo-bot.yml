name: Repo Bot

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

jobs:
  repo-bot:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Repo Bot
        uses: ddaodan/bettergi-github-bot@ab2ff0e2acbf8003ac5c88bd6b8977a25075509d
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO_BOT_AI_API_KEY: ${{ secrets.REPO_BOT_AI_API_KEY }}
          REPO_BOT_AI_BASE_URL: ${{ vars.REPO_BOT_AI_BASE_URL }}
        with:
          config-path: .github/repo-bot.yml
          config-overrides-json: ${{ vars.REPO_BOT_CONFIG_OVERRIDES_JSON }}
